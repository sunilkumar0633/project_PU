<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }

        input {
            padding: 8px;
            margin: 10px;
            width: 70%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Web Testing Page</h1>
    <p>This is a sample page for testing HTML, CSS, and JavaScript.</p>

    <h3>Login Form</h3>
    <form onsubmit="return validateForm()">
        <input type="text" id="username" placeholder="Enter Username"><br>
        <input type="password" id="password" placeholder="Enter Password"><br>
        <button type="submit">Login</button>
    </form>

    <h3>Click Test</h3>
    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
</div>

<script>
    function showMessage() {
        document.getElementById("message").innerText = "Button Clicked Successfully!";
    }

    function validateForm() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "" || pass === "") {
            alert("Please fill all fields!");
            return false;
        }

        alert("Form submitted successfully!");
        return true;
    }
</script>

</body>
</html>
